name: Deploy site

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload site by explicit FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "FTPS upload attempt $attempt..."

            lftp <<EOF && exit 0
          set ftp:use-feat false
          set ftp:ssl-allow true
          set ftp:ssl-force true
          set ftp:ssl-auth TLS
          set ftp:ssl-protect-data true
          set ssl:verify-certificate true
          set ssl:check-hostname false
          set net:timeout 30
          open -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_SERVER:21"
          mirror --reverse --delete --verbose ./_site/ ./
          bye
          EOF

            echo "Attempt $attempt failed."
            sleep 20
          done

          echo "All FTPS upload attempts failed."
          exit 1