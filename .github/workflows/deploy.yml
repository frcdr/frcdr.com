name: Deploy site

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install WinSCP
        shell: pwsh
        run: choco install winscp -y --no-progress

      - name: Upload site with WinSCP
        shell: pwsh
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_CERTIFICATE: ${{ secrets.FTP_CERTIFICATE }}
        run: |
          $winscp = "${env:ProgramFiles(x86)}\WinSCP\WinSCP.com"
          if (!(Test-Path $winscp)) {
            $winscp = "${env:ProgramFiles}\WinSCP\WinSCP.com"
          }

          $script = @"
          option batch abort
          option confirm off
          open ftps://$env:FTP_SERVER/ -explicit -username="$env:FTP_USERNAME" -password="$env:FTP_PASSWORD" -certificate="$env:FTP_CERTIFICATE" -passive=on
          synchronize remote -delete -filemask="| /.cagefs/; /.cl.selector/" "$env:GITHUB_WORKSPACE\_site" "/"
          exit
          "@

          $script | Set-Content winscp-script.txt -Encoding ASCII

          & $winscp /ini=nul /script=winscp-script.txt /log=winscp.log

          if ($LASTEXITCODE -ne 0) {
            Get-Content winscp.log -Tail 200
            exit $LASTEXITCODE
          }